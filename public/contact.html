<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact - Gaming Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=25">
    
    <link rel="icon" type="image/png" href="/centurio-logo.png?v=3">
    <link rel="apple-touch-icon" href="/centurio-logo.png?v=3">
    <link rel="manifest" href="/manifest.json?v=3">
    <meta name="theme-color" content="#291834">

    <style>
        /* 1. FOND D'ÉCRAN INCREVABLE */
        html, body { margin: 0 !important; padding: 0 !important; height: 100% !important; width: 100% !important; background-color: #291834 !important; }
        .fullscreen-bg { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: url('/centurio-gaming-zone-bg.jpg'); background-size: cover !important; background-position: center center !important; background-repeat: no-repeat !important; z-index: -10; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        
        .header-v2 { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 15px; }
        .header-title, .hamburger-btn, .lang-btn { color: white !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* 2. LE GLASSMORPHISM SUR LE CONTENU */
        .page-content { 
            width: 90%; max-width: 600px; margin: 0 auto 20px; padding: 35px 25px; 
            background: rgba(41, 24, 52, 0.75) !important; 
            backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important; 
            border-radius: 20px; text-align: center; color: white !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5) !important; 
            border: 1px solid rgba(255,255,255,0.15) !important; 
            position: relative; z-index: 1;
        }

        .page-content h2 { color: white !important; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .page-content p { color: #eaeaea !important; }
        .brand-logo img { width: 120px; height: auto; }
        .linktree-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 12px; }
        
        /* Les boutons transparents */
        .link-btn { display: flex; align-items: center; width: 100%; padding: 16px 20px; border-radius: 15px; background: rgba(255,255,255,0.1) !important; color: white !important; text-decoration: none; font-weight: 600; font-size: 14px; border: 1px solid rgba(255,255,255,0.2) !important; transition: all 0.3s ease; }
        .link-btn:hover { background: rgba(255,255,255,0.15) !important; transform: scale(1.02); }
        .link-btn .icon { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 15px; border-radius: 10px; background: rgba(255,255,255,0.2) !important; }
        .btn-main { background: var(--brand) !important; border: none !important; margin-top: 10px; }

        /* Menus en mode Sombre */
        .side-menu { position: fixed; top: 0; right: -250px; width: 250px; height: 100vh; background: #1a1a1a; box-shadow: -5px 0 15px rgba(0,0,0,0.5); z-index: 3000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 20px; border-left: 1px solid #333; }
        .side-menu.open { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .menu-overlay.open { opacity: 1; pointer-events: auto; }
        .close-menu { align-self: flex-end; font-size: 30px; cursor: pointer; color: #fff; margin-bottom: 20px; border: none; background: transparent; }
        .side-menu a { text-decoration: none; color: #fff; font-size: 16px; font-weight: 600; padding: 15px 10px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .side-menu a:hover { color: var(--brand); padding-left: 15px; }

        .lang-dropdown { position: relative; z-index: 1000; }
        .lang-menu { display: none; position: absolute; top: 35px; left: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; overflow: hidden; width: 140px; text-align: left; }
        .lang-menu div { padding: 12px 15px; cursor: pointer; font-size: 14px; font-weight: 600; color: #fff; }
        .lang-menu div:hover { background: #333; }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        #night-btn { display: none !important; }
        body > .skiptranslate { display: none !important; }
        body { top: 0px !important; }
        .goog-te-banner-frame { display: none !important; }
    </style>
</head>
<body>
    <div class="fullscreen-bg"></div>

    <div class="header-v2">
        <div class="lang-dropdown">
            <div class="lang-btn" onclick="toggleLang()">🇫🇷</div>
            <div class="lang-menu" id="lang-list">
                <div onclick="changeLang('fr', '🇫🇷')">🇫🇷 Français</div>
                <div onclick="changeLang('en', '🇬🇧')">🇬🇧 English</div>
                <div onclick="changeLang('es', '🇪🇸')">🇪🇸 Español</div>
            </div>
        </div>
        <div class="header-title" style="font-weight: 800; letter-spacing: -0.5px;">AGENCE CENTURIO</div>
        <div class="hamburger-btn" onclick="toggleMenu()">☰</div>
    </div>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>
    <div class="side-menu" id="side-menu">
        <button class="close-menu" onclick="toggleMenu()">×</button>
        <a href="index.html">🏠 Accueil</a>
        <a href="defis.html">🎮 Défis</a>
        <a href="contact.html" style="color: var(--brand);">✉️ Contact</a>
        <a href="reglement.html">📜 Règles</a>
        <div style="margin-top: auto; margin-bottom: 20px;">
            <a href="index.html?admin=open" style="border-top: 2px solid #333; border-bottom: none; color: #888; font-size: 14px; margin-top: 20px;">
                🔒 Espace Staff
            </a>
        </div>
    </div>

    <div class="page-content fade-in">
        <div class="brand-logo">
            <img src="/centurio-logo.png" alt="Logo Centurio">
        </div>
        <h2 style="margin-bottom: 5px;">AGENCE CENTURIO</h2>
        <p style="font-size: 12px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;">Gaming & Esport Event</p>

        <div class="linktree-wrapper">
            <a href="https://centurio.fr/" target="_blank" class="link-btn">
                <div class="icon">🌐</div> Site Officiel
            </a>
            <a href="https://centurio.fr/nos-realisations/" target="_blank" class="link-btn">
                <div class="icon">🎬</div> Nos Réalisations
            </a>
            <a href="https://www.instagram.com/centurio.esport/" target="_blank" class="link-btn">
                <div class="icon">📸</div> Instagram
            </a>
            <a href="https://x.com/Centurio_agence" target="_blank" class="link-btn">
                <div class="icon">✖️</div> X (Twitter)
            </a>
            <a href="https://www.linkedin.com/company/agence-centurio/" target="_blank" class="link-btn">
                <div class="icon">💼</div> LinkedIn
            </a>
            <a href="https://centurio.fr/contactez-nous/" target="_blank" class="link-btn btn-main">
                <div class="icon" style="background:transparent!important;">✉️</div> NOUS CONTACTER
            </a>
        </div>
    </div>

    <button id="night-btn"></button> <div id="google_translate_element" style="display:none;"></div>
    <script>function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'fr', autoDisplay: false}, 'google_translate_element'); }</script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script src="script.js?v=25"></script>
    <script>
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); document.getElementById('menu-overlay').classList.toggle('open'); }
        function toggleLang() { const menu = document.getElementById('lang-list'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
        function changeLang(langCode, flag) { document.querySelector('.lang-btn').innerText = flag; document.getElementById('lang-list').style.display = 'none'; localStorage.setItem('centurioFlag', flag); const select = document.querySelector('.goog-te-combo'); if (select) { select.value = langCode; select.dispatchEvent(new Event('change')); } else { document.cookie = `googtrans=/fr/${langCode}; path=/`; window.location.reload(); } }
        document.addEventListener('DOMContentLoaded', () => { const savedFlag = localStorage.getItem('centurioFlag'); if (savedFlag) document.querySelector('.lang-btn').innerText = savedFlag; });
    </script>
</body>
</html>
