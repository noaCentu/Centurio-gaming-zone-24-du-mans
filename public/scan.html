<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Centurio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 🪄 ASTUCE N°1 : On cache le cadre de visée dessiné par la bibliothèque */
        #reader svg {
            display: none !important;
        }
        
        /* 🪄 ASTUCE N°2 : On force la vidéo à remplir notre joli cadre sans se déformer */
        #reader video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 10px !important;
        }
    </style>
</head>
<body>
    <div class="header-v2">
        <div class="header-title">Scanner <span>Staff</span></div>
    </div>

    <div class="page-content" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
        <h2 style="margin-bottom: 5px;">Validation Rapide</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Pointez vers le QR Code (toute l'image scanne).</p>
        
        <div id="reader" style="width: 100%; max-width: 350px; height: 350px; border-radius: 15px; overflow: hidden; border: 4px solid var(--secondary); background-color: black; box-shadow: 0 10px 20px rgba(0,0,0,0.3);"></div>
        
        <div id="scan-result" style="margin-top: 20px; font-weight: 800; font-size: 18px; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 350px;">
        </div>

        <button class="btn-cancel" onclick="logout()" style="margin-top: 30px; text-decoration: underline; font-size: 14px;">Se déconnecter de l'espace Staff</button>
    </div>

    <nav class="navbar">
        <a href="scan.html" class="nav-btn active">📸 Scanner</a>
    </nav>

    <script>
        const token = localStorage.getItem('centurioAdminToken');
        if (!token) {
            window.location.href = "index.html"; 
        }

        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false; 

        function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            
            document.getElementById('reader').style.borderColor = "var(--brand)";

            try {
                const url = new URL(decodedText);
                const userId = url.searchParams.get('user');
                const gameId = url.searchParams.get('game');

                if (userId && gameId) {
                    fetch('/api/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId, gameId: gameId, token: token })
                    })
                    .then(res => res.json())
                    .then(data => {
                        const resultDiv = document.getElementById('scan-result');
                        resultDiv.style.display = 'block';

                            resultDiv.style.backgroundColor = '#d4edda'; 
                            resultDiv.style.color = '#155724';

                            document.getElementById('reader').style.borderColor = "var(--success)";
