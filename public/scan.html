<script>
        const token = localStorage.getItem('centurioAdminToken');
        if (!token) {
            window.location.href = "index.html"; // Sécurité
        }

        // On utilise l'objet direct au lieu du Scanner UI pour forcer la caméra
        const html5QrCode = new Html5Qrcode("reader");
        let isScanningPaused = false; // Petite sécurité pour ne pas valider 10 fois par seconde

        function onScanSuccess(decodedText) {
            if (isScanningPaused) return; // Si c'est en pause, on ignore
            isScanningPaused = true;      // On met en pause le temps de valider
            
            try {
                const url = new URL(decodedText);
                const userId = url.searchParams.get('user');
                const gameId = url.searchParams.get('game');

                if (userId && gameId) {
                    fetch('/api/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId, gameId: gameId, token: token })
                    })
                    .then(res => res.json())
                    .then(data => {
                        const resultDiv = document.getElementById('scan-result');
                        resultDiv.style.display = 'block';
                        
                        if(data.success) {
                            resultDiv.style.backgroundColor = '#d4edda';
                            resultDiv.style.color = '#155724';
                            resultDiv.innerText = "✅ DÉFI VALIDÉ !";
                        } else {
                            resultDiv.style.backgroundColor = '#f8d7da';
                            resultDiv.style.color = '#721c24';
                            resultDiv.innerText = "❌ ERREUR : " + data.message;
                        }

                        // On efface le message et on relance le scan après 2.5 secondes
                        setTimeout(() => {
                            resultDiv.style.display = 'none';
                            isScanningPaused = false;
                        }, 2500);
                    });
                } else {
                    alert("QR Code invalide pour ce jeu.");
                    setTimeout(() => { isScanningPaused = false; }, 2000);
                }
            } catch(e) {
                alert("Ce n'est pas un QR Code Centurio.");
                setTimeout(() => { isScanningPaused = false; }, 2000);
            }
        }

        // 🚀 C'EST ICI LA MAGIE : On force la caméra arrière !
        html5QrCode.start(
            { facingMode: "environment" }, // "environment" = Caméra arrière principale
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            (errorMessage) => {
                // On ignore les erreurs de frame (c'est normal quand il n'y a pas de QR code devant)
            }
        ).catch((err) => {
            alert("Erreur d'accès à la caméra. Vérifiez les autorisations de votre téléphone.");
        });

        function logout() {
            // On éteint la caméra proprement avant de partir
            html5QrCode.stop().then(() => {
                localStorage.removeItem('centurioAdminToken');
                window.location.href = "index.html";
            }).catch(err => {
                localStorage.removeItem('centurioAdminToken');
                window.location.href = "index.html";
            });
        }
    </script>
