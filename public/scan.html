<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Centurio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="header-v2">
        <div class="header-title">Scanner <span>Staff</span></div>
    </div>

    <div class="page-content" style="text-align: center;">
        <h2 style="margin-bottom: 10px;">Validation Rapide</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Scannez le QR Code Centurio du joueur.</p>
        
        <div id="reader" style="width: 100%; max-width: 350px; height: 350px; margin: 0 auto; border-radius: 15px; overflow: hidden; border: 4px solid var(--secondary); background-color: black;"></div>
        
        <div id="scan-result" style="margin-top: 20px; font-weight: 800; font-size: 18px; padding: 20px; border-radius: 15px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            </div>

        <button class="btn-cancel" onclick="logout()" style="margin-top: 40px; text-decoration: underline; font-size: 14px;">Se déconnecter de l'espace Staff</button>
    </div>

    <nav class="navbar">
        <a href="scan.html" class="nav-btn active">📸 Scanner</a>
    </nav>

    <script>
        // 1. SÉCURITÉ : Vérification du badge invisible (token)
        const token = localStorage.getItem('centurioAdminToken');
        if (!token) {
            alert("🚨 ACCÈS REFUSÉ : Connectez-vous d'abord !");
            window.location.href = "index.html"; 
        }

        // Initialisation de l'objet direct
        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false; // Sécurité anti-double flash

        // Quand le QR est flashé
        function onScanSuccess(decodedText) {
            if (isProcessing) return; // On ignore si on traite déjà une validation
            isProcessing = true;
            console.log("QR Code détecté : ", decodedText);

            // Aide au débogage visuel
            document.getElementById('reader').style.borderColor = "var(--brand)";

            try {
                // Analyse de l'URL contenue dans le QR Code
                const url = new URL(decodedText);
                const userId = url.searchParams.get('user');
                const gameId = url.searchParams.get('game');

                if (userId && gameId) {
                    // C'est un bon QR Code, on envoie au serveur
                    fetch('/api/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId, gameId: gameId, token: token })
                    })
                    .then(res => res.json())
                    .then(data => {
                        const resultDiv = document.getElementById('scan-result');
                        resultDiv.style.display = 'block';
                        
                        if(data.success) {
                            // ✅ SUCCÈS TOTAL
                            resultDiv.style.backgroundColor = '#d4edda'; // Vert clair
                            resultDiv.style.color = '#155724'; // Vert foncé
                            resultDiv.style.border = "2px solid #c3e6cb";
                            resultDiv.innerText = "✅ DÉFI " + gameId.toUpperCase() + " VALIDÉ !";
                            document.getElementById('reader').style.borderColor = "var(--success)";
                        } else {
                            // ❌ ERREUR SERVEUR (Triche, token expiré...)
                            resultDiv.style.backgroundColor = '#f8d7da'; // Rouge clair
                            resultDiv.style.color = '#721c24'; // Rouge foncé
                            resultDiv.style.border = "2px solid #f5c6cb";
                            resultDiv.innerText = "❌ ERREUR SERVEUR : " + data.message;
                            document.getElementById('reader').style.borderColor = "red";
                        }

                        // On nettoie et on relance le scan après 2.5 secondes
                        setTimeout(() => {
                            resultDiv.style.display = 'none';
                            document.getElementById('reader').style.borderColor = "var(--secondary)";
                            isProcessing = false;
                        }, 2500);
                    })
                    .catch(err => {
                        alert("🚨 ERREUR RÉSEAU : Impossible de joindre le serveur. Vérifiez la 4G.");
                        isProcessing = false;
                        document.getElementById('reader').style.borderColor = "var(--secondary)";
                    });
                } else {
                    // ❌ FORMAT INVALIDE (user ou game manquants)
                    alert("❌ FORMAT QR INVALIDE :\nIl manque 'user' ou 'game' dans l'URL.");
                    setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--secondary)"; }, 2000);
                }
            } catch(e) {
                // ❌ CE N'EST PAS UNE URL
                alert("❌ QR CODE INCONNU :\nCe n'est pas un code Centurio valide (format URL requis).");
                setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--secondary)"; }, 2000);
            }
        }

        // 🚀 Démarrage forcé sur la caméra ARRIÈRE (Back Camera / x1 zoom)
        html5QrCode.start(
            { facingMode: "environment" }, // Force la caméra arrière principale
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess,
            (errorMessage) => {
                // On ignore les erreurs de frame vides
            }
        ).catch((err) => {
            // ❌ PROBLÈME DE PERMISSION OU MATÉRIEL
            console.error("Erreur caméra : ", err);
            alert("🚨 ERREUR CAMÉRA :\nImpossible d'accéder à la caméra arrière. Vérifiez les autorisations de votre navigateur.");
        });

        function logout() {
            // Arrêt propre de la caméra
            if(html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    localStorage.removeItem('centurioAdminToken');
                    window.location.href = "index.html";
                }).catch(err => {
                    localStorage.removeItem('centurioAdminToken');
                    window.location.href = "index.html";
                });
            } else {
                localStorage.removeItem('centurioAdminToken');
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
