<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Centurio PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="header-v2">
        <div class="header-title">Scanner <span>Staff</span></div>
    </div>

    <div class="page-content" style="text-align: center;">
        <h2 style="margin-bottom: 5px;">Validation Rapide</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Pointez vers le QR Code (scan plein écran).</p>
        
        <div id="reader" style="width: 100%; max-width: 350px; margin: 0 auto; border-radius: 15px; overflow: hidden; border: 4px solid var(--secondary); background-color: black; box-shadow: 0 10px 20px rgba(0,0,0,0.3);"></div>
        
        <div id="scan-result" style="margin-top: 20px; font-weight: 800; font-size: 18px; padding: 20px; border-radius: 15px; display: none; margin-left: auto; margin-right: auto; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        </div>

        <button class="btn-cancel" onclick="logout()" style="margin-top: 40px; text-decoration: underline; font-size: 14px;">Se déconnecter de l'espace Staff</button>
    </div>

    <nav class="navbar">
        <a href="scan.html" class="nav-btn active">📸 Scanner</a>
    </nav>

    <script>
        const token = localStorage.getItem('centurioAdminToken');
        if (!token) {
            window.location.href = "index.html"; 
        }

        const html5QrCode = new Html5Qrcode("reader");
        let isProcessing = false; 

        function onScanSuccess(decodedText) {
            if (isProcessing) return; 
            isProcessing = true;
            
            document.getElementById('reader').style.borderColor = "var(--brand)";

            try {
                const url = new URL(decodedText);
                const userId = url.searchParams.get('user');
                const gameId = url.searchParams.get('game');

                if (userId && gameId) {
                    fetch('/api/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: userId, gameId: gameId, token: token })
                    })
                    .then(res => res.json())
                    .then(data => {
                        const resultDiv = document.getElementById('scan-result');
                        resultDiv.style.display = 'block';
                        
                        if(data.success) {
                            resultDiv.style.backgroundColor = '#d4edda'; 
                            resultDiv.style.color = '#155724'; 
                            resultDiv.style.border = "2px solid #c3e6cb";
                            resultDiv.innerText = "✅ DÉFI " + gameId.toUpperCase() + " VALIDÉ !";
                            document.getElementById('reader').style.borderColor = "var(--success)";
                        } else {
                            resultDiv.style.backgroundColor = '#f8d7da'; 
                            resultDiv.style.color = '#721c24'; 
                            resultDiv.style.border = "2px solid #f5c6cb";
                            resultDiv.innerText = "❌ ERREUR : " + data.message;
                            document.getElementById('reader').style.borderColor = "red";
                        }

                        setTimeout(() => {
                            resultDiv.style.display = 'none';
                            document.getElementById('reader').style.borderColor = "var(--secondary)";
                            isProcessing = false;
                        }, 2500);
                    })
                    .catch(err => {
                        isProcessing = false;
                        document.getElementById('reader').style.borderColor = "var(--secondary)";
                    });
                } else {
                    setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--secondary)"; }, 1500);
                }
            } catch(e) {
                setTimeout(() => { isProcessing = false; document.getElementById('reader').style.borderColor = "var(--secondary)"; }, 1500);
            }
        }

        // 🪄 LA VRAIE SOLUTION : En enlevant le mot "qrbox" de ce code, 
        // la bibliothèque ne dessine pas le carré de visée et scanne sur 100% de la surface !
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 15 }, // <-- Juste la vitesse, pas de taille imposée
            onScanSuccess,
            (errorMessage) => { }
        ).catch((err) => {
            alert("🚨 ERREUR CAMÉRA :\nImpossible d'accéder à la caméra arrière. Vérifiez vos autorisations.");
        });

        function logout() {
            if(html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    localStorage.removeItem('centurioAdminToken');
                    window.location.href = "index.html";
                }).catch(err => {
                    localStorage.removeItem('centurioAdminToken');
                    window.location.href = "index.html";
                });
            } else {
                localStorage.removeItem('centurioAdminToken');
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
