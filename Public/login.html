<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Animateur - Centurio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: var(--secondary); }
        .login-box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color: var(--brand); margin-bottom: 10px; text-transform: uppercase; }
        .login-box p { font-size: 13px; color: #666; margin-bottom: 25px; }
        .login-box input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--primary); font-size: 16px; text-align: center; margin-bottom: 20px; outline: none; }
        .login-box input:focus { border-color: var(--brand); }
        .btn-submit { width: 100%; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Espace Animateur</h2>
        <p>Veuillez vous identifier pour pouvoir flasher les QR Codes des joueurs.</p>
        
        <input type="password" id="password" placeholder="Mot de passe équipe">
        <button class="btn-submit" onclick="login()">Se connecter</button>
        <p id="error-msg" style="color: red; margin-top: 15px; font-weight: bold; display: none;">Mot de passe incorrect</p>
    </div>

    <script>
        function login() {
            const pwd = document.getElementById('password').value;
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // On enregistre le badge invisible dans le téléphone !
                    localStorage.setItem('centurioAdminToken', data.token);
                    alert("✅ Connexion réussie ! Votre téléphone est maintenant certifié. Vous pouvez flasher les QR Codes.");
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            });
        }
    </script>
</body>
</html>
